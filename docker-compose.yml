volumes:
  n8n_storage:
  postgres_storage:
  qdrant_storage:
  docling_data:

networks:
  demo:

x-n8n: &service-n8n
  image: n8nio/n8n:latest
  networks: ['demo']
  environment:
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=postgres
    - DB_POSTGRESDB_USER=${POSTGRES_USER}
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    - N8N_DIAGNOSTICS_ENABLED=false
    - N8N_PERSONALIZATION_ENABLED=false
    - N8N_ENCRYPTION_KEY
    - N8N_USER_MANAGEMENT_JWT_SECRET
    - N8N_RESTRICT_FILE_ACCESS_TO=/data/shared
    - NODES_EXCLUDE=[]
    - OPENROUTER_API_KEY
    - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
  env_file:
    - path: .env
      required: true

# ===========================================
# Docling Base Configuration (YAML Anchor)
# ===========================================
x-docling: &service-docling
  image: ghcr.io/docling-project/docling-serve:main
  container_name: docling
  networks: ['demo']
  restart: unless-stopped
  # Run as root to fix bind mount permissions on Windows
  user: root
  working_dir: /shared/docling-scratch
  expose:
    - 5001/tcp
  ports:
    - 5001:5001
  environment:
    - DOCLING_SERVE_ENABLE_UI=true
    - DOCLING_SERVE_SCRATCH_PATH=/shared/docling-scratch
    # Keep results after retrieval so other services can access them
    - DOCLING_SERVE_SINGLE_USE_RESULTS=false
    # Serialize document conversion to one at a time so concurrent OCR jobs
    # cannot exhaust the Docker VM memory and crash the container
    - DOCLING_SERVE_ENG_LOC_NUM_WORKERS=1
    # Gradio security: allow writing to /shared directory
    - GRADIO_ALLOWED_PATHS=/shared
    - GRADIO_TEMP_DIR=/shared/docling-scratch
    - DOCLING_SERVE_ENABLE_REMOTE_SERVICES=true
  volumes:
    - docling_data:/data
    - ./shared:/shared
  healthcheck:
    test: ['CMD', 'curl', '-f', 'http://localhost:5001/health']
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 60s

services:
  postgres:
    image: postgres:16-alpine
    hostname: postgres
    networks: ['demo']
    restart: unless-stopped
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  n8n-import:
    <<: *service-n8n
    hostname: n8n-import
    container_name: n8n-import
    entrypoint: /bin/sh
    command:
      - '-c'
      - |
        # Only import if not already done (check marker file)
        if [ -f /n8n/.imported ]; then
          echo "Seed data already imported - skipping"
        else
          echo "First run detected - importing seed data..."
          n8n import:credentials --separate --input=/n8n/credentials
          n8n import:workflow --separate --input=/n8n/workflows
          touch /n8n/.imported
          echo "Import complete"
        fi
    volumes:
      - ./n8n:/n8n
    depends_on:
      postgres:
        condition: service_healthy

  n8n:
    <<: *service-n8n
    hostname: n8n
    container_name: n8n
    restart: unless-stopped
    # Run as root to access shared files created by Docling (also running as root)
    user: root
    ports:
      - 5678:5678
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./n8n:/n8n
      - ./shared:/data/shared
    depends_on:
      postgres:
        condition: service_healthy
      n8n-import:
        condition: service_completed_successfully

  qdrant:
    image: qdrant/qdrant
    hostname: qdrant
    container_name: qdrant
    networks: ['demo']
    restart: unless-stopped
    ports:
      - 6333:6333
    volumes:
      - qdrant_storage:/qdrant/storage

  # ===========================================
  # Inbox Poker - keeps the file trigger alive
  # ===========================================
  # Docker Desktop's VirtioFS does not propagate host file events or the
  # watched directory's mtime into containers, so n8n's localFileTrigger never
  # detects files dropped via Finder. This sidecar touches the inbox directory
  # from inside the VM every few seconds, which updates the mtime the poller
  # watches and wakes it to re-scan. A poke with no new file yields no event,
  # so there is no execution-log spam.
  inbox-poker:
    image: alpine:latest
    container_name: inbox-poker
    networks: ['demo']
    restart: unless-stopped
    volumes:
      - ./shared:/data/shared
    command: sh -c "while true; do touch /data/shared/rag-files/inbox; sleep 5; done"

  # ===========================================
  # Static File Server - Serves shared folder
  # ===========================================
  # Chat UI at http://localhost:8080/
  static-files:
    image: nginx:alpine
    hostname: static-files
    container_name: static-files
    networks: ['demo']
    restart: unless-stopped
    ports:
      - 8080:80
    volumes:
      - ./web:/usr/share/nginx/html:ro
    command: |
      sh -c "echo 'server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;
        autoindex on;
        location / {
          try_files \$$uri \$$uri/ =404;
          add_header Access-Control-Allow-Origin *;
        }
      }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

  # ===========================================
  # Docling - Document Processing
  # ===========================================
  # OCR and document parsing service
  # Accessible at http://localhost:5001
  # Uses profiles: cpu, gpu-nvidia, gpu-amd
  # Docs: https://github.com/docling-project/docling-serve

  docling-cpu:
    profiles: ['cpu']
    <<: *service-docling

  docling-gpu:
    profiles: ['gpu-nvidia']
    <<: *service-docling
    image: ghcr.io/docling-project/docling-serve-cu126:main
    environment:
      - DOCLING_SERVE_ENABLE_UI=true
      - DOCLING_SERVE_SCRATCH_PATH=/shared/docling-scratch
      - DOCLING_SERVE_SINGLE_USE_RESULTS=false
      - DOCLING_SERVE_ENG_LOC_NUM_WORKERS=1
      - GRADIO_ALLOWED_PATHS=/shared
      - GRADIO_TEMP_DIR=/shared/docling-scratch
      - NVIDIA_VISIBLE_DEVICES=all
      - DOCLING_SERVE_ENABLE_REMOTE_SERVICES=true
    runtime: nvidia

  docling-gpu-amd:
    profiles: ['gpu-amd']
    <<: *service-docling
    image: ghcr.io/docling-project/docling-serve-rocm:main
    environment:
      - DOCLING_SERVE_ENABLE_UI=true
      - DOCLING_SERVE_SCRATCH_PATH=/shared/docling-scratch
      - DOCLING_SERVE_SINGLE_USE_RESULTS=false
      - DOCLING_SERVE_ENG_LOC_NUM_WORKERS=1
      - GRADIO_ALLOWED_PATHS=/shared
      - GRADIO_TEMP_DIR=/shared/docling-scratch
      - ROCR_VISIBLE_DEVICES=0
      - DOCLING_SERVE_ENABLE_REMOTE_SERVICES=true
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - 44 # video group GID (run: getent group video)
      - 109 # render group GID (run: getent group render)
