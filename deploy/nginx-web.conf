server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Keep this private deployment out of search engines. The header applies to
  # every response (HTML and assets) and is the directive crawlers actually
  # honor for de-indexing. "always" ensures it is sent on error responses too.
  add_header X-Robots-Tag "noindex, nofollow" always;

  location / {
    try_files $uri $uri/ =404;
  }
}
